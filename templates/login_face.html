{% extends "base.html" %}

{% block content %}
    <div style="text-align: center;">
        <h2>Vérification Faciale</h2>
        <p>Utilisateur : <strong>{{ email if email else "Non spécifié" }}</strong></p>
        
        {% if not email %}
            <div style="margin-bottom: 20px;">
                <label>Veuillez confirmer votre email :</label><br>
                <input type="email" id="face_email" value="{{ email }}" required>
            </div>
        {% else %}
            <input type="hidden" id="face_email" value="{{ email }}">
        {% endif %}

        <div style="position: relative; display: inline-block;">
            <video id="video" width="400" height="300" autoplay playsinline style="border-radius: 10px; border: 3px solid #2196F3;"></video>
            <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
        </div>
        
        <br><br>
        <button id="capture_btn" style="padding: 15px 30px; font-size: 16px; cursor: pointer; background-color: #2196F3; color: white; border: none; border-radius: 5px;">
            Scanner mon visage
        </button>
        
        <p id="status_msg" style="margin-top: 20px; font-weight: bold;"></p>
        <a href="{{ url_for('login') }}">Retour à la connexion classique</a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture_btn');
        const statusMsg = document.getElementById('status_msg');
        const emailInput = document.getElementById('face_email');

        // 1. Demander l'accès et allumer la webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                video.play();
            })
            .catch(err => {
                console.error("Erreur webcam: ", err);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Impossible d'accéder à la caméra. Vérifiez les permissions du navigateur.";
            });

        // 2. Action au clic sur le bouton "Scanner mon visage"
        captureBtn.addEventListener('click', () => {
            const email = emailInput.value;
            if (!email) {
                alert("L'email est requis pour vous identifier !");
                return;
            }

            // Afficher le chargement
            statusMsg.style.color = "blue";
            statusMsg.innerText = "Analyse en cours... Veuillez patienter.";
            captureBtn.disabled = true; // Empêche de cliquer 10 fois

            // Prendre la photo en arrière-plan
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 400, 300);
            const dataUrl = canvas.toDataURL('image/jpeg');

            // Envoyer la photo à notre route Python '/login/face'
            fetch('/login/face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, photo_base64: dataUrl })
            })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    statusMsg.style.color = "green";
                    statusMsg.innerText = "Succès ! Connexion réussie...";
                    window.location.href = "/"; // On redirige vers l'accueil
                } else {
                    statusMsg.style.color = "red";
                    statusMsg.innerText = data.message;
                    captureBtn.disabled = false; // On débloque le bouton pour réessayer
                }
            })
            .catch(err => {
                console.error("Erreur serveur:", err);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Erreur de communication avec le serveur.";
                captureBtn.disabled = false;
            });
        });
    </script>
{% endblock %}
